# FreqBridge Configuration Template
# Copy this file to settings.toml and fill in real values.
# NEVER commit settings.toml — it is gitignored.

[simulation]
tick_duration_s = 30          # Simulated seconds per tick
total_ticks = 2880            # 24h at 30s/tick
num_microgrids = 5            # Total agents (split across east/west)

[grid]
east_frequency_hz = 50.0      # Eastern grid nominal frequency
west_frequency_hz = 60.0      # Western grid nominal frequency

[converter]
capacity_mw = 300.0           # HVDC converter max transfer capacity
loss_rate = 0.02              # 2% transmission loss
ramp_rate_mw_per_tick = 50.0  # Max change per tick

[physics]
# Two-area swing equation parameters
inertia_east_h = 5.0          # Inertia constant H (seconds) — east
inertia_west_h = 6.0          # Inertia constant H (seconds) — west
damping_east_d = 1.0          # Damping coefficient D — east
damping_west_d = 1.2          # Damping coefficient D — west
sync_coeff_t12 = 0.5          # Synchronizing power coefficient

[weather]
# Ornstein-Uhlenbeck process parameters
solar_mean_reversion = 0.5    # theta — mean reversion rate
solar_long_term_mean = 0.6    # mu — long-term mean (0-1 capacity factor)
solar_volatility = 0.15       # sigma — volatility
wind_mean_reversion = 0.3
wind_long_term_mean = 0.4
wind_volatility = 0.2
forecast_horizon_min = 90     # Forecast look-ahead in minutes

[hedging]
# These thresholds are DEMO-TUNED, not derived from historical LOLE data.
hedge_trigger_probability = 0.65   # Enter hedge mode at this blackout P
emergency_threshold = 0.73         # Emergency reserve at this blackout P
buffer_reserve_pct = 0.20          # Reserve 20% of battery for survival

[market]
price_floor = 5.0             # ¥/kWh minimum clearing price
price_ceiling = 50.0          # ¥/kWh maximum clearing price

[dashboard]
theme = "dark"                # "dark" or "light"
refresh_ticks = 5             # Default play-N-ticks step count

[data]
# JEPX price data source
jepx_csv_path = "data/jepx_prices_sample.csv"
